  - name: Enviar email
    hosts: Mail

    vars:
      mail_user: "comandes@iemhosting.asix2.iesmontsia.cat"
      mail_password: ""
      mail_host: "mx.iemhosting.asix2.iesmontsia.cat"
      db_email: "{{ correud }}"
      nom_paquet: "{{ paquet }}"

      nom_paquet: >-
        {% if paquet == '1' %}Delta Lite 5GB
        {% elif paquet == '2' %}Delta Pro 20GB
        {% elif paquet == '3' %}Delta Business 50GB
        {% else %}Delta Lite 5GB{% endif %}

    tasks:
      - name: Enviar correu mitjançant SMTP
        community.general.mail:
          host: "{{ mail_host }}"
          port: 465
          secure: always 
          username: "{{ mail_user }}"
          password: "{{ mail_password }}"
          to: "{{ db_email }}"
          from: "{{ mail_user }}"
          subject: "Benvingut {{ db_user }} a IEM HOSTING"
          charset: utf8
          body: |
            Benvolgut/da  {{ db_user }},

            Gràcies per confiar en IEM Hosting. És un plaer donar-li la benvinguda com a nou client.

            El teu hosting ha estat creat correctament amb les següents dades:

            - Paquet contractat: {{ nom_paquet }}
            - Domini: {{ db_user }}.iemhosting.asix2.iesmontsia.cat

            ────────────────────────────────────
            SFTP
            ────────────────────────────────────
            Usuari:      {{ db_user }}
            Contrasenya: {{ db_pass }}
            Port:        1302
            IP Pública:  185.13.77.175

            ────────────────────────────────────
            PHPMyAdmin
            ────────────────────────────────────
            Enllaç:      db.iemhosting.asix2.iesmontsia.cat
            Usuari:      {{ db_user }}
            Contrasenya: {{ db_pass }}


            ────────────────────────────────────
            GESTOR D'INCIDÈNCIES
            ────────────────────────────────────
            Enllaç:      https://glpi.iemhosting.asix2.iesmontsia.cat/
            Usuari:      {{ db_user }}
            Contrasenya: {{ db_pass }}

            ────────────────────────────────────

            Gràcies per confiar en IEM HOSTING!